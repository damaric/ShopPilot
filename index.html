<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototyp - Navigierungssystem</title>

    <?xml version="1.0" encoding="UTF-8" standalone="no"?>


    <style>

      body {
         margin: 0; 
         height: 100vh;
         background: linear-gradient(135deg, #f5f0e8 0%, #f5f0e8 20%,  #bfbcb7 40%,  #a7a7a7 60%,  #ffffff 80%,  #ffffff 100%);
      }

      .container-produkt {
         margin: 15px;
         display: flex;
         justify-content: center;
         align-items: center;  
         flex-direction: column;       
      }

      #input-produkt {
         font-size: 25px; 
         border-radius: 15px;
         outline: none;
         border: none;
         padding: 10px;
         gap: 15px;
      }

      .container-suchen {
         display: flex;
         justify-content: center;
         align-items: center;     
      }

      #button-suchen {
         font-size: 20px;
         border-radius: 15px;
         outline: none;
         border: none;
         padding: 10px;
         cursor: pointer;
         font-weight: bold;
      }

      #button-suchen:hover {
         background-color: rgb(190, 190, 190);
      }


      .container-main {
         display: flex;
         justify-content: center;
         align-items: center;
         gap: 10px;
         flex-wrap: wrap;
      }

      #skizze {
         display: block; /* inline - element kann man nicht verschieben (skizze), block element kann man verschieben */
         width: 95%;
         max-width: 100%;
         height: 60vh;
         margin: 10px auto;
      }

      @media (max-width: 768px) {      /* wird an jedes Handy angepasst (Button u. Suchleiste) */
         #input-produkt {
            font-size: 18px;
            width: 70%;
         }

         #button-suchen {
            font-size: 16px;
            padding: 8px;
         }

         #skizze {
            width: 100%;
            height: 70vh;
            margin: 5px auto;
         }
      }

      svg {
         width: 100%;
         height: auto;
      }

      .highlight {
         fill: rgb(40, 40, 40) !important;   
      }

      .highlight-red {
         fill: red !important;
      }

      #vorschläge {
         position: absolute;
         top: 100%;
         left: 0;
         width: 100%;
         background: white;
         border: 1px solid #ccc;
         max-height: 120px;
         overflow-y: auto;    /* scrollbar */
      }

      .vorschläge {
         padding: 8px;
         cursor: pointer;
      }

      .vorschläge:hover {
         background-color: #eee;
      }

      .search-container {
         position: relative;
         width: 300px;
      }
 
    </style>

</head>




<body>

   
      <div id="myPopup" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; border: 3px solid #8BBFE6;">
         <h3>SONDERANGEBOT IM ROT MARKIERTEN REGAL!</h3>
         <p>50% Rabatt - NUR HEUTE!</p>
         <p>Zuschlagen bevor es weg ist.</p>
         <button onclick="closePopup()" style="background: #8BBFE6; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;">OK</button>
      </div>
      <div id="overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999;"></div>



   <div class="container-main">

      <div class="container-produkt"> 
         <div class="search-container">

         </div>
      </div>
      <div class="container-suchen">
         <button type="submit" id="button-suchen" onclick="showLine()">Suchen!</button>  
      </div>

    </div>
