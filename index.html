<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototyp - Navigierungssystem</title>

    <?xml version="1.0" encoding="UTF-8" standalone="no"?>


    <style>

      body {
         margin: 0; 
         height: 100vh;
         background: linear-gradient(135deg, #f5f0e8 0%, #f5f0e8 20%,  #bfbcb7 40%,  #a7a7a7 60%,  #ffffff 80%,  #ffffff 100%);
      }

      .container-produkt {
         margin: 15px;
         display: flex;
         justify-content: center;
         align-items: center;  
         flex-direction: column;       
      }

      #input-produkt {
         font-size: 25px; 
         border-radius: 15px;
         outline: none;
         border: none;
         padding: 10px;
         gap: 15px;
      }

      .container-suchen {
         display: flex;
         justify-content: center;
         align-items: center;     
      }

      #button-suchen {
         font-size: 20px;
         border-radius: 15px;
         outline: none;
         border: none;
         padding: 10px;
         cursor: pointer;
         font-weight: bold;
      }

      #button-suchen:hover {
         background-color: rgb(190, 190, 190);
      }


      .container-main {
         display: flex;
         justify-content: center;
         align-items: center;
         gap: 10px;
         flex-wrap: wrap;
      }

      #skizze {
         display: block; /* inline - element kann man nicht verschieben (skizze), block element kann man verschieben */
         margin: 40px auto;
         max-width: 900px;
         width: 100%;
         height: auto;
      }

      @media (max-width: 768px) {      /* wird an jedes Handy angepasst (Button u. Suchleiste) */
         #input-produkt {
            font-size: 18px;
            width: 70%;
         }

         #button-suchen {
            font-size: 16px;
            padding: 8px;
         }
      }

      svg {
         width: 100%;
         height: auto;
      }

      .highlight {
         fill: rgb(40, 40, 40) !important;   
      }

      .highlight-red {
         fill: red !important;
      }
 
    </style>

</head>

         <h3>SONDERANGEBOT IM ROT MARKIERTEN REGAL!</h3>

   <script>

      let routeToggle = 0;
      let letztesZielElement = null;


         function showLine() {
            showPopup();

            // Das SVG - Layer holen, auf dem die Linien gezeichnet werden
            const layer = document.getElementById("layer1");

            // Alle alten Linien mit der Klasse ".route-line" löschen damit nicht mehrere Routen übereinander kommen
            layer.querySelectorAll(".route-line").forEach(line => line.remove());

            if (letztesZielElement) {
               letztesZielElement.classList.remove("highlight");
            }

            const obenRechts = document.getElementById("rect5-0-0-6");
            const mittelRegal = document.getElementById("rect5-00-8");
            const unteresRegal = document.getElementById("rect5-00");
            const linkesRegal = document.getElementById("rect5-12-1");

            // SVG - Element "Eingang" holen
            const eingang = document.getElementById("Eingang");

            // X und Y Position der Mitte vom Eingang berechnen
            const startX = parseFloat(eingang.getAttribute("x")) + parseFloat(eingang.getAttribute("width")) / 2;
            const startY = parseFloat(eingang.getAttribute("y")) + parseFloat(eingang.getAttribute("height")) / 2;

            // SVG - Element "Fleischtheke" holen
            const fleischtheke = document.getElementById("Fleischtheke");

            // X und Y Position der Mitte von der Fleischtheke berechnen
            const zielX = parseFloat(fleischtheke.getAttribute("x")) + parseFloat(fleischtheke.getAttribute("width")) / 2;
            const zielY = parseFloat(fleischtheke.getAttribute("y")) + parseFloat(fleischtheke.getAttribute("height")) / 2;

            // SVG - ELement "Oberes Regal links" holen
            const obenLinks = document.getElementById("rect5");

            // X und Y Posistion von Regal berechnen
            const zielX2 = parseFloat(obenLinks.getAttribute("x")) + parseFloat(obenLinks.getAttribute("width")) / 2;
            const zielY2 = parseFloat(obenLinks.getAttribute("y")) + parseFloat(obenLinks.getAttribute("height")) / 2;

            

            // Zwischenpunkt (Mitte)
            const mitteX = 220;
            const mitteY = 80;

            // 1. SVG - Linie erstellen
            const line1 = document.createElementNS("http://www.w3.org/2000/svg", "line");

            // Klasse hinzufügen (damit später löschbar)
            line1.setAttribute("class", "route-line");

            line1.setAttribute("x1", startX);      // Startpunkt X = Mitte vom Eingang
            line1.setAttribute("y1", startY)       // Startpunkt Y = Mitte vom Eingang

            line1.setAttribute("x2", 220);         // Endpunkt X = fester Zwischenpunkt
            line1.setAttribute("y2", 80);          // Endpunkt Y = fester Zwischenpunkt

            line1.setAttribute("stroke", "#8BBFE6");      // Linie grün färben
            line1.setAttribute("stroke-width", "1.5");  // Dicke der Linie festlegen

            layer.appendChild(line1);     
            
            
            // Zustand 1 = Fleischtheke
            if (routeToggle === 0) {
                     
                     // 2. SVG - Linie erstellen
                     const line2 = document.createElementNS("http://www.w3.org/2000/svg", "line");

                     // Klasse hinzufügen
                     line2.setAttribute("class", "route-line");

                     line2.setAttribute("x1", 220); // Startpunkt X = Zwischenpunkt
                     line2.setAttribute("y1", 80);  // Startpunkt Y = Zwischenpunkt

                     line2.setAttribute("x2", zielX) // Endpunkt X = Fleischtheke
                     line2.setAttribute("y2", zielY) // Endpunkt Y = Fleischtheke

                     line2.setAttribute("stroke", "#8BBFE6");  // Linie grün färben
                     line2.setAttribute("stroke-width", "1.5")   // Dicke der Linie
                     layer.appendChild(line2);

                     letztesZielElement = fleischtheke;

                     routeToggle = 1;

            // Zustand 2 = Regal links oben
            } else if (routeToggle === 1) {
                     // 3. Linie  (Eingang bis Mitte)
                     const line3 = document.createElementNS("http://www.w3.org/2000/svg", "line");

                     line3.setAttribute("class", "route-line");

                     line3.setAttribute("x1", mitteX);   // Startpunkt X = Mitte
                     line3.setAttribute("y1", mitteY);    // Startpunkt Y = Mitte

                     line3.setAttribute("x2", zielX2);      // Endpunkt X = Oben Links
                     line3.setAttribute("y2", zielY2);       // Endpunkt Y = Oben Links

                     line3.setAttribute("stroke", "#8BBFE6");
                     line3.setAttribute("stroke-width", "1.5");
  
                     layer.appendChild(line3);     // Dritte Linie in SVG einfügen
                     
                     letztesZielElement = obenLinks;

                     routeToggle = 2;
            }

            // Zustand 3 = Regal rechts oben
            else if (routeToggle === 2) {
                  // 4. Linie (Mitte bis oben rechts)
                  const line4 = document.createElementNS("http://www.w3.org/2000/svg", "line");

                  line4.setAttribute("class", "route-line");

                  line4.setAttribute("x1", mitteX); // Startpunkt Mitte
                  line4.setAttribute("y1", mitteY); // Startpunkt Mitte

                  line4.setAttribute("x2", 262);  // Endpunkt = Oberes Regal rechts
                  line4.setAttribute("y2", 39);  // Endpunkt = Oberes Regal rechts

                  line4.setAttribute("stroke", "#8BBFE6");
                  line4.setAttribute("stroke-width", "1.5");

                  layer.appendChild(line4);

                  letztesZielElement = obenRechts;

                  routeToggle = 3;
            }  
            
            else if(routeToggle === 3) {
                  // 5. Linie
                  const line5 = document.createElementNS("http://www.w3.org/2000/svg", "line");

                  line5.setAttribute("class", "route-line");

                  line5.setAttribute("x1", mitteX);
                  line5.setAttribute("y1", mitteY);

                  line5.setAttribute("x2", 135);
                  line5.setAttribute("y2", 83);

                  line5.setAttribute("stroke", "#8BBFE6");
                  line5.setAttribute("stroke-width", "1.5");

                  layer.appendChild(line5);

                  // 6. Linie
                  const line6 = document.createElementNS("http://www.w3.org/2000/svg", "line");

                  line6.setAttribute("class", "route-line");

                  line6.setAttribute("x1", 135);
                  line6.setAttribute("y1", 83);

                  line6.setAttribute("x2", 137);
                  line6.setAttribute("y2", 129);

                  line6.setAttribute("stroke", "#8BBFE6");
                  line6.setAttribute("stroke-width", "1.5");

                  layer.appendChild(line6);

                  // 7. Linie
                  const line7 = document.createElementNS("http://www.w3.org/2000/svg", "line");

                  line7.setAttribute("class", "route-line");

                  line7.setAttribute("x1", 137);
                  line7.setAttribute("y1", 129);

                  line7.setAttribute("x2", 130);
                  line7.setAttribute("y2", 130);

                  line7.setAttribute("stroke", "#8BBFE6");
                  line7.setAttribute("stroke-width", "1.5");

                  layer.appendChild(line7); 

                  
                  letztesZielElement = mittelRegal;
                  

                  routeToggle = 4;
            }

            else if(routeToggle === 4) {


                  // 8. Linie
                  const line8 = document.createElementNS("http://www.w3.org/2000/svg", "line");

                  line8.setAttribute("class", "route-line");

                  line8.setAttribute("x1", mitteX);
                  line8.setAttribute("y1", mitteY);

                  line8.setAttribute("x2", 135);
                  line8.setAttribute("y2", 83);

                  line8.setAttribute("stroke", "#8BBFE6");
                  line8.setAttribute("stroke-width", "1.5");

                  layer.appendChild(line8);

                  // 9. Linie
                  const line9 = document.createElementNS("http://www.w3.org/2000/svg", "line");

                  line9.setAttribute("class", "route-line");

                  line9.setAttribute("x1", 135);
                  line9.setAttribute("y1", 83);

                  line9.setAttribute("x2", 136);
                  line9.setAttribute("y2", 154);

                  line9.setAttribute("stroke", "#8BBFE6");
                  line9.setAttribute("stroke-width", "1.5");

                  layer.appendChild(line9);

                  // 10. Linie
                  const line10 = document.createElementNS("http://www.w3.org/2000/svg", "line");

                  line10.setAttribute("class", "route-line");

                  line10.setAttribute("x1", 136);
                  line10.setAttribute("y1", 154);

                  line10.setAttribute("x2", 129);
                  line10.setAttribute("y2", 153);

                  line10.setAttribute("stroke", "#8BBFE6");
                  line10.setAttribute("stroke-width", "1.5");

                  layer.appendChild(line10);

                  letztesZielElement = unteresRegal;

                  routeToggle = 5;   
            }

            else if(routeToggle === 5) {

                  // 11. Linie
                  const line11 = document.createElementNS("http://www.w3.org/2000/svg", "line");

                  line11.setAttribute("class", "route-line");

                  line11.setAttribute("x1", mitteX);
                  line11.setAttribute("y1", mitteY);

                  line11.setAttribute("x2", 10);
                  line11.setAttribute("y2", 95);

                  line11.setAttribute("stroke", "#8BBFE6");
                  line11.setAttribute("stroke-width", "1.5");

                  layer.appendChild(line11);


                  letztesZielElement = linkesRegal;

                  routeToggle = 6;
            }

            else if(routeToggle === 6) {

                  // 12. Linie
                  const line12 = document.createElementNS("http://www.w3.org/2000/svg", "line");

                  line12.setAttribute("class", "route-line");

                  line12.setAttribute("x1", mitteX);
                  line12.setAttribute("y1", mitteY);

                  line12.setAttribute("x2", 262);
                  line12.setAttribute("y2", 58);

                  line12.setAttribute("stroke", "#8BBFE6");
                  line12.setAttribute("stroke-width", "1.5");

                  layer.appendChild(line12);

                  letztesZielElement = obenRechts;

                  routeToggle = 0;
            }

            if (letztesZielElement) {
               letztesZielElement.classList.add("highlight");
            }
         } 


      // Berechnet die exakten Koordinaten jedes Objektes im SVG --> Untersuchen --> Konsole
      const svg = document.querySelector("svg");
      svg.addEventListener("click", function(e) {
      const pt = svg.createSVGPoint();
      pt.x = e.clientX;
      pt.y = e.clientY;
      const svgPunkt = pt.matrixTransform(svg.getScreenCTM().inverse());
      console.log("SVG X:", svgPunkt.x);
      console.log("SVG Y:", svgPunkt.y);
      });


      // Regal einfärben
      const btn = document.getElementById('button-suchen');
      const box = document.getElementById('rect5-7');

      btn.addEventListener('click', function() {
         box.style.fill = 'red';
      });




      function showPopup() {
            document.getElementById('myPopup').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
         }

      function closePopup() {
            document.getElementById('myPopup').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
         }

// Popup beim Klick schließen (klickt man außerhalb)
document.getElementById('overlay').addEventListener('click', closePopup);


      

   </script>
